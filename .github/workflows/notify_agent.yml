name: Notify self-healing agent on failure

on:
  workflow_run:
    workflows: ["*"]
    types: [completed]

jobs:
  notify-agent:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Fetch logs and notify agent
        uses: actions/github-script@v7
        with:
          script: |
            const run_id = context.payload.workflow_run.id;
            
            // Fetch jobs for this run
            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id,
            });
            
            // Extract log text from job steps
            let logText = "";
            for (const job of jobs.data.jobs) {
              logText += `\nJob: ${job.name} — ${job.conclusion}\n`;
              for (const step of job.steps || []) {
                logText += `  Step: ${step.name} — ${step.conclusion}\n`;
              }
            }
            
            // Try to get full logs
            try {
              const logsResp = await github.rest.actions.downloadWorkflowRunLogs({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id,
              });
              logText += `\nLog URL: ${logsResp.url}`;
            } catch(e) {}
            
            const payload = {
              ...context.payload,
              raw_logs: logText
            };
            
            await fetch("${{ secrets.AGENT_WEBHOOK_URL }}/webhook/github", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "X-GitHub-Event": "workflow_run"
              },
              body: JSON.stringify(payload)
            });
