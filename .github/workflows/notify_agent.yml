name: Notify self-healing agent on failure

on:
  workflow_run:
    workflows: ["Backend CI/CD"]
    types: [completed]

jobs:
  notify-agent:
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.name == 'Backend CI/CD'
    runs-on: ubuntu-latest

    steps:
      - name: Get logs and notify agent
        uses: actions/github-script@v7
        env:
          AGENT_WEBHOOK_URL: ${{ secrets.AGENT_WEBHOOK_URL }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const runId = context.payload.workflow_run.id;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            let logText = '';

            logText += `Workflow: ${context.payload.workflow_run.name}\n`;
            logText += `Branch: ${context.payload.workflow_run.head_branch}\n`;
            logText += `SHA: ${context.payload.workflow_run.head_sha}\n`;
            logText += `Conclusion: ${context.payload.workflow_run.conclusion}\n`;
            logText += `Commit Message: ${context.payload.workflow_run.head_commit?.message || 'N/A'}\n\n`;

            // ----------------------------------------------------
            // Collect failed jobs + steps
            // ----------------------------------------------------
            const jobsResp = await github.rest.actions.listJobsForWorkflowRun({
              owner,
              repo,
              run_id: runId,
              filter: "latest"
            });

            logText += "=== JOB SUMMARY ===\n";

            for (const job of jobsResp.data.jobs) {
              logText += `\nJOB: ${job.name}\n`;
              logText += `STATUS: ${job.conclusion}\n`;

              for (const step of (job.steps || [])) {
                logText += `  [${step.conclusion || 'skipped'}] ${step.name}\n`;
              }
            }

            // ----------------------------------------------------
            // Download workflow logs ZIP
            // ----------------------------------------------------
            logText += "\n\n=== RAW LOGS ===\n";

            try {
              const logDownload = await github.request(
                "GET /repos/{owner}/{repo}/actions/runs/{run_id}/logs",
                {
                  owner,
                  repo,
                  run_id: runId
                }
              );

              const zipUrl = logDownload.url;

              const zipResp = await fetch(zipUrl);

              if (!zipResp.ok) {
                throw new Error(
                  `Failed downloading logs: ${zipResp.status}`
                );
              }

              const buffer = Buffer.from(await zipResp.arrayBuffer());

              const JSZip = require("jszip");
              const zip = await JSZip.loadAsync(buffer);

              for (const fileName of Object.keys(zip.files)) {
                const file = zip.files[fileName];

                if (file.dir) continue;

                const content = await file.async("string");

                logText += `\n\n===== ${fileName} =====\n`;

                const tail = content
                  .split("\n")
                  .slice(-200)
                  .join("\n");

                logText += tail;
              }
            } catch (err) {
              logText += `\n[Failed to download logs: ${err.message}]\n`;
            }

            // ----------------------------------------------------
            // Trim payload size
            // ----------------------------------------------------
            const MAX_CHARS = 100000;

            if (logText.length > MAX_CHARS) {
              logText =
                logText.slice(logText.length - MAX_CHARS);
            }

            core.info("Sending logs to self-healing agent...");
            core.info(logText.slice(0, 3000));

            const payload = {
              workflow_run: {
                id: context.payload.workflow_run.id,
                name: context.payload.workflow_run.name,
                conclusion: context.payload.workflow_run.conclusion,
                head_sha: context.payload.workflow_run.head_sha,
                head_branch: context.payload.workflow_run.head_branch
              },
              repository: {
                owner,
                repo
              },
              raw_logs: logText
            };

            const response = await fetch(
              `${process.env.AGENT_WEBHOOK_URL}/webhook/github`,
              {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  "X-GitHub-Event": "workflow_run"
                },
                body: JSON.stringify(payload)
              }
            );

            core.info(
              `Agent webhook response: ${response.status}`
            );

            if (!response.ok) {
              const body = await response.text();
              core.setFailed(
                `Webhook failed (${response.status}): ${body}`
              );
            }
