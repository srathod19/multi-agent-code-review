name: Notify self-healing agent on failure

on:
  workflow_run:
    workflows: ["Backend CI/CD"]
    types: [completed]

jobs:
  notify-agent:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Get logs and notify agent
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const run_id = context.payload.workflow_run.id;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            let logText = `Workflow: ${context.payload.workflow_run.name}\n`;
            logText += `Branch: ${context.payload.workflow_run.head_branch}\n`;
            logText += `Commit: ${context.payload.workflow_run.head_commit?.message || 'N/A'}\n\n`;

            const jobsResp = await github.rest.actions.listJobsForWorkflowRun({
              owner, repo, run_id, filter: 'latest'
            });

            for (const job of jobsResp.data.jobs) {
              logText += `\nJOB: ${job.name} [${job.conclusion}]\n`;
              for (const step of (job.steps || [])) {
                logText += `  STEP [${step.conclusion ?? 'skipped'}]: ${step.name}\n`;
              }
              if (job.conclusion === 'failure') {
                try {
                  const jobLog = await github.rest.actions.downloadJobLogsForWorkflowRun({
                    owner, repo, job_id: job.id
                  });
                  const logLines = String(jobLog.data)
                    .split('\n')
                    .filter(l => l.trim())
                    .slice(-100)
                    .join('\n');
                  logText += `\n--- ACTUAL LOG ---\n${logLines}\n`;
                } catch(e) {
                  logText += `  [log fetch failed: ${e.message}]\n`;
                }
              }
            }

            core.info("=== LOG BEING SENT ===");
            core.info(logText.substring(0, 1000));

            const payload = {
              workflow_run: context.payload.workflow_run,
              repository: context.payload.repository,
              raw_logs: logText
            };

            const resp = await fetch(process.env.AGENT_WEBHOOK_URL + '/webhook/github', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'X-GitHub-Event': 'workflow_run'
              },
              body: JSON.stringify(payload)
            });
            core.info(`Agent response: ${resp.status}`);
        env:
          AGENT_WEBHOOK_URL: ${{ secrets.AGENT_WEBHOOK_URL }}
