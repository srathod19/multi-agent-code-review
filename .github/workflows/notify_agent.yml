name: Notify self-healing agent on failure

on:
  workflow_run:
    workflows: ["*"]
    types: [completed]

jobs:
  notify-agent:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Fetch annotations and notify agent
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const run_id = context.payload.workflow_run.id;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            let logText = `Workflow: ${context.payload.workflow_run.name}\n`;
            logText += `Branch: ${context.payload.workflow_run.head_branch}\n`;
            logText += `Commit message: ${context.payload.workflow_run.head_commit?.message || 'N/A'}\n\n`;

            // Fetch jobs and steps
            const jobsResp = await github.rest.actions.listJobsForWorkflowRun({
              owner, repo, run_id
            });

            for (const job of jobsResp.data.jobs) {
              logText += `JOB: ${job.name} — ${job.conclusion}\n`;
              for (const step of job.steps || []) {
                logText += `  STEP [${step.conclusion}]: ${step.name}\n`;
              }

              // Fetch annotations for failed jobs (contains actual error messages)
              if (job.conclusion === 'failure') {
                try {
                  const annotations = await github.rest.checks.listAnnotations({
                    owner, repo,
                    check_run_id: job.id
                  });
                  for (const ann of annotations.data) {
                    logText += `\nERROR in ${ann.path} line ${ann.start_line}:\n`;
                    logText += `  ${ann.message}\n`;
                    logText += `  Level: ${ann.annotation_level}\n`;
                  }
                } catch(e) {
                  logText += `  Could not fetch annotations: ${e.message}\n`;
                }
              }
            }

            logText += `\nRepo: ${owner}/${repo}\n`;
            console.log("Sending to agent:\n" + logText.substring(0, 800));

            const payload = { ...context.payload, raw_logs: logText };

            const response = await fetch(
              `${process.env.AGENT_WEBHOOK_URL}/webhook/github`,
              {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  "X-GitHub-Event": "workflow_run"
                },
                body: JSON.stringify(payload)
              }
            );
            console.log("Agent response:", response.status);
        env:
          AGENT_WEBHOOK_URL: ${{ secrets.AGENT_WEBHOOK_URL }}
