name: Notify self-healing agent on failure

on:
workflow_run:
workflows: ["*"]
types: [completed]

jobs:
notify-agent:
if: ${{ github.event.workflow_run.conclusion == 'failure' }}
runs-on: ubuntu-latest

```
steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Install dependencies
    run: npm install axios adm-zip

  - name: Fetch logs and notify agent
    uses: actions/github-script@v7
    with:
      script: |
        const axios = require("axios");
        const AdmZip = require("adm-zip");

        const run_id = context.payload.workflow_run.id;

        // Fetch jobs
        const jobs = await github.rest.actions.listJobsForWorkflowRun({
          owner: context.repo.owner,
          repo: context.repo.repo,
          run_id,
        });

        let logText = "";

        // Add failed jobs + steps
        for (const job of jobs.data.jobs) {
          if (job.conclusion === "failure") {
            logText += `\n\n===== JOB: ${job.name} =====\n`;

            for (const step of job.steps || []) {
              logText += `Step: ${step.name} — ${step.conclusion}\n`;
            }
          }
        }

        // Download actual logs ZIP
        try {
          const logsResp =
            await github.rest.actions.downloadWorkflowRunLogs({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id,
            });

          const zipResponse = await axios.get(logsResp.url, {
            responseType: "arraybuffer",
          });

          const zip = new AdmZip(zipResponse.data);
          const entries = zip.getEntries();

          for (const entry of entries) {
            if (!entry.isDirectory) {
              let content = entry.getData().toString("utf8");

              // Remove ANSI colors
              content = content.replace(/\u001b\[[0-9;]*m/g, "");

              // Limit size
              content = content.slice(-50000);

              logText += `\n\n===== LOG FILE: ${entry.entryName} =====\n`;
              logText += content;
            }
          }
        } catch (e) {
          logText += `\n\nFailed to fetch workflow logs: ${e.message}`;
        }

        const payload = {
          repository: context.payload.repository.full_name,
          workflow: context.payload.workflow_run.name,
          run_id,
          conclusion: context.payload.workflow_run.conclusion,
          html_url: context.payload.workflow_run.html_url,
          raw_logs: logText,
        };

        await fetch(
          "${{ secrets.AGENT_WEBHOOK_URL }}/webhook/github",
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "X-GitHub-Event": "workflow_run",
            },
            body: JSON.stringify(payload),
          }
        );
